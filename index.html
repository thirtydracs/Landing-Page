 <!DOCTYPE html>
<html>
<head>
  <title>Site Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      gap: 15px;
    }

    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 12px;
    }

    .btn {
      display: block;
      margin-top: 10px;
      padding: 12px;
      text-align: center;
      text-decoration: none;
      background: #111;
      color: #fff;
      border-radius: 8px;
    }

    @media(max-width:800px){
      .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<h1>Site Hub</h1>
<p>Induction and Sign In / Out access</p>

<div class="grid grid-3" id="projects"></div>

<script src="data.js"></script>

<script>
const container = document.getElementById("projects");

if (container && typeof projects !== "undefined") {
  container.innerHTML = projects.map(p => `
    <div class="card">
      <h3>${p.name}</h3>

      <a class="btn" href="${p.induction}" target="_blank">
        Site Induction
      </a>

      <a class="btn" href="${p.signin}" target="_blank">
        Site Sign In / Out
      </a>
    </div>
  `).join("");
}
</script>

</body>
</html>
